model:
  model_id: "google/gemma-3-12b-it"

lora:
  r: 32
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: "all-linear"
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "outputs/bible-assistant"
  num_train_epochs: 1.5
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  weight_decay: 0.01
  max_length: 1536
  packing: false
  gradient_checkpointing: true
  optim: "adamw_torch"
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.10
  neftune_noise_alpha: 5
  max_grad_norm: 0.3
  logging_steps: 10
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 5
  eval_strategy: "steps"
  eval_steps: 100
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  bf16: true
  report_to: "trackio"

dataset:
  test_size: 0.1
  seed: 42

trackio:
  project: "bible-fine-tuning"
  run_name: "lora-gemma3-12b-answer-first"
  space_id: "KenZx0521/fine-tuning_bible"      # HF Space ID (e.g. "username/bible-fine-tuning"), leave empty for local-only
  dataset_id: ""    # HF Dataset ID for metric backup, leave empty for auto-naming
